name: LibreOfficeRest OXT

on:
  push:
    branches: [stable, main, test]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build OXT in Docker
        run: |
          ./LibreOfficeRest/tools/build-libreoffice-rest-docker.sh clean package -DskipTests=true -DskipITs=true

      - name: Prepare OXT
        run: |
          mkdir -p dist
          OXT="$(find LibreOfficeRest/target -maxdepth 1 -name 'LibreOfficeRest-*.oxt' | head -n 1)"
          test -f "$OXT"
          cp "$OXT" dist/LibreOfficeRest.oxt
          ls -lh dist/LibreOfficeRest.oxt

      - name: Upload OXT artifact
        uses: actions/upload-artifact@v4
        with:
          name: LibreOfficeRest.oxt
          path: dist/LibreOfficeRest.oxt
          if-no-files-found: error

      - name: Create stable version
        if: github.ref_name == 'stable'
        id: version
        run: |
          MAJOR="1"
          YY="$(date +%y)"
          MM="$(date +%m)"
          PREFIX="$MAJOR.$YY.$MM"

          git fetch --tags

          LAST_NUM="$(
            git tag -l "libreoffice-rest-$PREFIX.*" \
              | sed "s/^libreoffice-rest-$PREFIX\.//" \
              | sort -n \
              | tail -1
          )"

          if [ -z "$LAST_NUM" ]; then
            NEXT_NUM="001"
          else
            NEXT_NUM="$(printf "%03d" $((10#$LAST_NUM + 1)))"
          fi

          VERSION="$PREFIX.$NEXT_NUM"
          VERSION_TAG="libreoffice-rest-$VERSION"
          VERSION_FILE="LibreOfficeRest-$VERSION.oxt"

          cp dist/LibreOfficeRest.oxt "dist/$VERSION_FILE"

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_TAG=$VERSION_TAG" >> "$GITHUB_ENV"
          echo "VERSION_FILE=$VERSION_FILE" >> "$GITHUB_ENV"

      - name: Publish concrete stable version release
        if: github.ref_name == 'stable'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "$VERSION_TAG" "$GITHUB_SHA"
          git push origin "$VERSION_TAG"

          gh release create "$VERSION_TAG" "dist/$VERSION_FILE" \
            --title "LibreOfficeRest $VERSION" \
            --notes "Stable LibreOfficeRest OXT release $VERSION." \
            --latest=true

      - name: Publish stable latest release with versioned file
        if: github.ref_name == 'stable'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="libreoffice-rest-latest-stable"

          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "$TAG"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "LibreOfficeRest stable latest" \
              --notes "Latest stable LibreOfficeRest OXT. File is concrete-versioned." \
              --latest=false

          gh release edit "$TAG" \
            --title "LibreOfficeRest stable latest" \
            --notes "Latest stable LibreOfficeRest OXT. File is concrete-versioned." \
            --latest=false

          gh release upload "$TAG" "dist/$VERSION_FILE" --clobber

      - name: Publish main latest release
        if: github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="libreoffice-rest-latest-main"
          FILE="LibreOfficeRest-main.oxt"

          cp dist/LibreOfficeRest.oxt "dist/$FILE"

          git tag -f "$TAG" "$GITHUB_SHA"
          git push -f origin "$TAG"

          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --title "NonStable Latest from branch main" \
              --notes "Latest non-stable LibreOfficeRest OXT from branch main." \
              --latest=false

          gh release edit "$TAG" \
            --title "NonStable Latest from branch main" \
            --notes "Latest non-stable LibreOfficeRest OXT from branch main." \
            --latest=false

          gh release upload "$TAG" "dist/$FILE" --clobber